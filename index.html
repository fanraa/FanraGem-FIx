              slideUp: {
                '0%': { transform: 'translate(-50%, 100%)', opacity: '0' },

              slideInLeft: {
                '0%': { transform: 'translateX(-100%)', opacity: '0' },

              fadeIn: {
                '0%': { opacity: '0', transform: 'scale(0.95)' },
                '100%': { opacity: '1', transform: 'scale(1)' },
              },
              shine: {
                '0%': { transform: 'translateX(-100%)' },
                '100%': { transform: 'translateX(100%)' },
              }
            }
          }
        }
